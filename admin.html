<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Messages</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .login-form { max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e1e5e9; border-radius: 8px; font-size: 16px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; font-size: 16px; transition: transform 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-secondary { background: #6c757d; }
        .messages-list { padding: 30px; }
        .message-item { background: #f8f9fa; margin-bottom: 20px; padding: 20px; border-radius: 12px; border-left: 4px solid #667eea; }
        .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .message-meta { color: #6c757d; font-size: 0.9rem; }
        .message-text { line-height: 1.6; margin-bottom: 15px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .logout { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        @media (max-width: 768px) { .stats { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Admin Panel</h1>
            <p>Portfolio Contact Messages</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="login-form">
            <h2>Login</h2>
            <form id="login">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <p style="text-align: center; margin-top: 15px; color: #6c757d;">
                Default: admin / admin123
            </p>
        </div>

        <!-- Messages Dashboard -->
        <div id="dashboard" class="hidden">
            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalMessages">0</h3>
                    <p>Total Messages</p>
                </div>
                <div class="stat-card">
                    <h3 id="todayMessages">0</h3>
                    <p>Today</p>
                </div>
            </div>
            
            <div class="messages-list">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>All Messages (<span id="messagesCount">0</span>)</h2>
                    <button id="logout" class="logout">Logout</button>
                </div>
                <div id="messagesList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // Login
        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    loadMessages(data.token);
                } else {
                    alert(data.error || 'Login failed');
                }
            } catch (err) {
                alert('Login error: ' + err.message);
            }
        });
        
        // Load Messages
        async function loadMessages(token) {
            try {
                const response = await fetch(`${API_BASE}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const messages = await response.json();
                
                document.getElementById('messagesCount').textContent = messages.length;
                document.getElementById('totalMessages').textContent = messages.length;
                
                const list = document.getElementById('messagesList');
                list.innerHTML = messages.map(msg => `
                    <div class="message-item">
                        <div class="message-header">
                            <h3>${msg.name}</h3>
                            <span class="message-meta">${new Date(msg.timestamp).toLocaleString()}</span>
                        </div>
                        <p class="message-meta"><i class="fas fa-envelope"></i> ${msg.email}</p>
                        <div class="message-text">${msg.message}</div>
                    </div>
                `).join('');
            } catch (err) {
                alert('Failed to load messages');
            }
        }
        
        // Logout
        document.getElementById('logout').addEventListener('click', () => {
            localStorage.removeItem('token');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('login').reset();
        });
        
        // Auto login if token exists
        const token = localStorage.getItem('token');
        if (token) {
            loadMessages(token);
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
    </script>
</body>
</html>
